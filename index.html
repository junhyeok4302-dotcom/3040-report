<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3040 베이스캠프 | 설문분석 & 기도실</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 1. Firebase 설정 검증 및 초기화
        let app, auth, db;
        try {
            const firebaseConfig = JSON.parse(__firebase_config);
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase 초기화 실패:", e);
            document.getElementById('submit-btn').innerText = "연결 오류 (설정 확인 필요)";
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-3040-app';

        // 2. 타임아웃 설정 (5초간 응답 없으면 버튼 강제 활성화 시도)
        setTimeout(() => {
            const btn = document.getElementById('submit-btn');
            if (btn && btn.disabled && btn.innerText === "연결 중...") {
                console.log("인증 지연으로 인한 강제 버튼 활성화");
                btn.disabled = false;
                btn.innerText = "포스트잇 붙이기";
            }
        }, 5000);

        // 3. 인증 처리 및 리스너 등록
        signInAnonymously(auth).catch(err => {
            console.error("익명 인증 실패:", err);
            // 인증에 실패하더라도 버튼은 열어두어 입력을 시도해볼 수 있게 합니다.
            const btn = document.getElementById('submit-btn');
            if(btn) { btn.disabled = false; btn.innerText = "포스트잇 붙이기"; }
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("인증 성공:", user.uid);
                const btn = document.getElementById('submit-btn');
                if (btn) {
                    btn.disabled = false;
                    btn.innerText = "포스트잇 붙이기";
                }
                setupPrayerListener();
            }
        });

        function setupPrayerListener() {
            try {
                const prayerRef = collection(db, 'artifacts', appId, 'public', 'data', 'prayers');
                onSnapshot(prayerRef, (snapshot) => {
                    const prayers = [];
                    snapshot.forEach((doc) => { prayers.push({ id: doc.id, ...doc.data() }); });
                    prayers.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                    renderPrayers(prayers);
                }, (err) => {
                    console.warn("데이터 읽기 권한 대기 중...");
                });
            } catch (e) {
                console.error("리스너 등록 실패:", e);
            }
        }

        window.submitPrayer = async () => {
            const nameInput = document.getElementById('prayer-name');
            const contentInput = document.getElementById('prayer-content');
            const btn = document.getElementById('submit-btn');

            if (!contentInput.value.trim()) {
                alert("내용을 입력해 주세요!");
                return;
            }
            
            btn.disabled = true;
            btn.innerText = "전송 중...";

            try {
                const prayerRef = collection(db, 'artifacts', appId, 'public', 'data', 'prayers');
                await addDoc(prayerRef, {
                    name: nameInput.value.trim() || "익명의 동역자",
                    content: contentInput.value.trim(),
                    amenCount: 0,
                    color: ['#fef3c7', '#dcfce7', '#dbeafe', '#fce7f3', '#f3e8ff'][Math.floor(Math.random() * 5)],
                    createdAt: serverTimestamp()
                });
                contentInput.value = ""; 
                nameInput.value = "";
            } catch (e) { 
                console.error("전송 에러:", e);
                alert("전송에 실패했습니다. 잠시 후 다시 시도해 주세요.");
            } finally {
                btn.disabled = false;
                btn.innerText = "포스트잇 붙이기";
            }
        };

        window.addAmen = async (id) => {
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'prayers', id);
                await updateDoc(docRef, { amenCount: increment(1) });
            } catch (e) {
                console.error("아멘 업데이트 실패:", e);
            }
        };

        function renderPrayers(prayers) {
            const container = document.getElementById('prayer-list');
            if (!container) return;
            if (prayers.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-stone-400 font-medium">아직 올라온 기도제목이 없습니다.<br>가장 먼저 마음을 나누어 보세요.</div>`;
                return;
            }
            container.innerHTML = prayers.map(p => `
                <div class="p-6 rounded-lg shadow-md transform rotate-${(Math.random() > 0.5 ? '1' : '-1')} transition hover:scale-105 hover:rotate-0" 
                     style="background-color: ${p.color || '#fef3c7'}; min-height: 200px; display: flex; flex-direction: column; justify-content: space-between;">
                    <div>
                        <div class="flex justify-between items-center mb-4 border-b border-black/5 pb-2">
                            <span class="text-[10px] font-bold text-stone-800/60 uppercase">${p.name}</span>
                            <span class="text-[9px] text-stone-800/40">${p.createdAt ? new Date(p.createdAt.seconds * 1000).toLocaleDateString() : '방금'}</span>
                        </div>
                        <p class="text-stone-800 text-sm leading-relaxed whitespace-pre-wrap font-medium">${p.content}</p>
                    </div>
                    <div class="mt-4 pt-2 border-t border-black/5 flex justify-end">
                        <button onclick="addAmen('${p.id}')" class="flex items-center gap-1 text-xs font-bold text-stone-700/60 hover:text-red-500 transition">
                            🙏 아멘 ${p.amenCount || 0}
                        </button>
                    </div>
                </div>
            `).join('');
        }
    </script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { background-color: #fdfbf7; color: #334155; font-family: 'Pretendard', sans-serif; overflow-x: hidden; }
        .page-content { display: none; }
        .page-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-link.active { color: #8b7355; font-weight: 800; border-bottom: 2px solid #8b7355; }
        .main-img { width: 100%; max-width: 500px; height: auto; border-radius: 2.5rem; box-shadow: 0 20px 50px rgba(139,115,85,0.15); margin: 0 auto; }
        .tab-link.active { background-color: #8b7355; color: white; }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 bg-white/90 backdrop-blur-md border-b border-stone-200">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <button onclick="navigateTo('home')" class="flex items-center gap-2 font-bold text-stone-800 text-lg tracking-tighter">
                <span>🌱</span> 3040 Basecamp
            </button>
            <div class="flex space-x-3 md:space-x-6 text-[11px] md:text-sm font-bold text-stone-500 uppercase">
                <button onclick="navigateTo('voices')" class="nav-link px-1 py-1 transition hover:text-[#8b7355]">분석</button>
                <button onclick="navigateTo('analytics')" class="nav-link px-1 py-1 transition hover:text-[#8b7355]">통계</button>
                <button onclick="navigateTo('vision')" class="nav-link px-1 py-1 transition hover:text-[#8b7355]">비전</button>
                <button onclick="navigateTo('prayer')" class="nav-link px-1 py-1 text-[#8b7355]">기도실</button>
            </div>
        </div>
    </nav>

    <div id="home" class="page-content active pt-32 min-h-screen text-center px-6">
        <div class="max-w-4xl mx-auto">
            <img src="9.jpg" alt="메인 이미지" class="main-img mb-12">
            <h1 class="text-3xl md:text-5xl font-extrabold text-stone-900 leading-tight mb-4 tracking-tighter">함께 그리며 걷는<br><span class="text-[#8b7355]">3040 공동체</span></h1>
            <p class="text-stone-500 text-lg max-w-xl mx-auto mb-10 leading-relaxed">우리 공동체의 첫 목소리와 비전을 담았습니다.</p>
            <div class="flex flex-wrap justify-center gap-4 pb-20">
                <button onclick="navigateTo('voices')" class="px-10 py-4 bg-[#8b7355] text-white rounded-full font-bold shadow-xl">분석 결과 보기</button>
                <button onclick="navigateTo('prayer')" class="px-10 py-4 bg-white text-[#8b7355] border-2 border-[#8b7355] rounded-full font-bold">기도 담벼락</button>
            </div>
        </div>
    </div>

    <div id="voices" class="page-content pt-24 min-h-screen">
        <div class="max-w-5xl mx-auto px-6 py-12 text-center">
            <h2 class="text-3xl font-extrabold mb-10 text-stone-800">우리가 나눈 이야기</h2>
            <div class="flex justify-center mb-12 p-1 bg-stone-100 rounded-2xl max-w-md mx-auto">
                <button onclick="switchTab('exp')" class="tab-link flex-1 py-3 rounded-xl text-sm font-bold active transition">경험</button>
                <button onclick="switchTab('worry')" class="tab-link flex-1 py-3 rounded-xl text-sm font-bold transition">고민</button>
                <button onclick="switchTab('ideal')" class="tab-link flex-1 py-3 rounded-xl text-sm font-bold transition">기대</button>
            </div>
            <div id="tab-content" class="grid grid-cols-1 md:grid-cols-2 gap-8 text-left"></div>
        </div>
    </div>

    <div id="analytics" class="page-content pt-24 min-h-screen bg-stone-50">
        <div class="max-w-6xl mx-auto px-6 py-12">
            <h2 class="text-3xl font-extrabold text-center mb-12">데이터로 본 우리의 마음</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div class="bg-white p-10 rounded-[2.5rem] border border-stone-100 shadow-sm">
                    <div class="h-72"><canvas id="needsChart"></canvas></div>
                </div>
                <div class="bg-white p-10 rounded-[2.5rem] border border-stone-100 shadow-sm">
                    <div class="h-72"><canvas id="concernsChart"></canvas></div>
                </div>
            </div>
        </div>
    </div>

    <div id="vision" class="page-content pt-24 min-h-screen bg-stone-900 text-white">
        <div class="max-w-4xl mx-auto px-6 py-20 text-center">
            <h2 class="text-4xl font-extrabold mb-16 text-[#d4b08c]">3040 베이스캠프 비전</h2>
            <div class="space-y-8 text-left">
                <div class="p-8 bg-stone-800 rounded-3xl border border-stone-700"><h4 class="text-xl font-bold mb-3 text-[#d4b08c]">1. 안전한 공감과 환대</h4><p class="text-stone-400">평가 없는 소그룹 나눔 문화를 만듭니다.</p></div>
                <div class="p-8 bg-stone-800 rounded-3xl border border-stone-700"><h4 class="text-xl font-bold mb-3 text-[#d4b08c]">2. 일상 영성의 회복</h4><p class="text-stone-400">직장과 육아 현장에서 신앙을 실천합니다.</p></div>
                <div class="p-8 bg-stone-800 rounded-3xl border border-stone-700"><h4 class="text-xl font-bold mb-3 text-[#d4b08c]">3. 현실적 제약의 동역</h4><p class="text-stone-400">육아 등 현실적 한계를 함께 해결합니다.</p></div>
            </div>
        </div>
    </div>

    <div id="prayer" class="page-content pt-24 min-h-screen bg-stone-200">
        <div class="max-w-6xl mx-auto px-6 py-12">
            <div class="text-center mb-12">
                <h2 class="text-4xl font-black text-stone-900 mb-4 tracking-tighter">실시간 기도의 담벼락</h2>
                <p class="text-stone-600 font-medium italic">성도님들의 마음을 담은 포스트잇을 붙여주세요.</p>
            </div>
            <div class="bg-white p-8 rounded-3xl border-4 border-stone-300 shadow-xl mb-16 max-w-2xl mx-auto">
                <div class="flex flex-col gap-4">
                    <input type="text" id="prayer-name" placeholder="이름 (비워두면 익명)" class="p-4 rounded-xl bg-stone-50 border border-stone-200 text-sm outline-none focus:ring-2 focus:ring-[#8b7355]">
                    <textarea id="prayer-content" placeholder="기도제목을 적어주세요..." rows="3" class="p-4 rounded-xl bg-stone-50 border border-stone-200 text-sm outline-none focus:ring-2 focus:ring-[#8b7355]"></textarea>
                    <button id="submit-btn" disabled onclick="submitPrayer()" class="bg-[#8b7355] disabled:bg-stone-400 text-white py-4 rounded-xl font-black transition text-lg shadow-lg">연결 중...</button>
                </div>
            </div>
            <div id="prayer-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 pb-20"></div>
        </div>
    </div>

    <script>
        function navigateTo(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.toggle('active', link.getAttribute('onclick').includes(pageId));
            });
            if (pageId === 'analytics') renderCharts();
            window.scrollTo(0, 0);
        }

        const surveyData = {
            exp: [{ title: "위로와 공감", items: ["나만 힘든 게 아니구나 하는 위로", "교회 친구 사귀기"] }, { title: "영적 갈급함", items: ["예수님과의 첫 사랑 회복", "기도해주는 동역자 매칭"] }],
            worry: [{ title: "가정/육아", items: ["자녀 양육의 어려움", "부부간 신앙 소통"] }, { title: "현실/직장", items: ["직장 생활 고충", "미래에 대한 준비"] }],
            ideal: [{ title: "소그룹", items: ["깊은 나눔이 가능한 3-4가정 모임"] }, { title: "환경", items: ["육아 분리가 가능한 현실적 모임"] }]
        };

        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-link').forEach(b => b.classList.toggle('active', b.getAttribute('onclick').includes(tabId)));
            document.getElementById('tab-content').innerHTML = surveyData[tabId].map(g => `
                <div class="bg-white p-8 rounded-3xl border border-stone-200 shadow-sm">
                    <h4 class="text-xl font-bold text-[#8b7355] mb-6 flex items-center gap-2">📌 ${g.title}</h4>
                    <ul class="space-y-4 text-stone-600 text-sm">${g.items.map(i => `<li class="flex items-start gap-2"><span>•</span>${i}</li>`).join('')}</ul>
                </div>`).join('');
        };
        switchTab('exp');

        let c1, c2;
        function renderCharts() {
            if (c1) c1.destroy(); if (c2) c2.destroy();
            c1 = new Chart(document.getElementById('needsChart'), { type: 'doughnut', data: { labels: ['교제', '영성', '지원'], datasets: [{ data: [45, 35, 20], backgroundColor: ['#8b7355', '#64748b', '#d6d3d1'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } } });
            c2 = new Chart(document.getElementById('concernsChart'), { type: 'bar', data: { labels: ['양육', '신앙', '직장', '부부', '경제'], datasets: [{ label: '빈도', data: [95, 80, 75, 60, 45], backgroundColor: '#8b7355', borderRadius: 10 }] }, options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
        }
    </script>
</body>
</html>
