<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3040 베이스캠프 | 설문분석 & 기도실</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 1. Firebase 초기화
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-3040-app';

        // 상태 표시용 함수
        const setStatus = (msg, isError = false) => {
            const el = document.getElementById('conn-status');
            if (el) {
                el.innerText = msg;
                el.className = isError ? "text-xs text-red-500 mt-2 font-bold" : "text-xs text-stone-400 mt-2";
            }
        };

        // 2. 인증 로직 (RULE 3 준수)
        const startAuth = async () => {
            setStatus("서버 연결 시도 중...");
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error(err);
                setStatus("인증 에러: " + err.message, true);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                setStatus("서버 연결됨 (온라인)");
                const btn = document.getElementById('submit-btn');
                if (btn) {
                    btn.disabled = false;
                    btn.innerText = "포스트잇 붙이기";
                    btn.className = "w-full bg-[#8b7355] text-white py-4 rounded-xl font-black transition text-lg shadow-lg hover:bg-[#6f5b44]";
                }
                setupPrayerListener();
            } else {
                setStatus("사용자 인증 필요");
            }
        });

        startAuth();

        // 3. 실시간 데이터 리스너
        function setupPrayerListener() {
            const prayerRef = collection(db, 'artifacts', appId, 'public', 'data', 'prayers');
            onSnapshot(prayerRef, (snapshot) => {
                const prayers = [];
                snapshot.forEach((doc) => { 
                    prayers.push({ id: doc.id, ...doc.data() }); 
                });
                // RULE 2: 메모리 정렬
                prayers.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderPrayers(prayers);
            }, (err) => {
                setStatus("데이터 권한 에러: " + err.message, true);
            });
        }

        // 4. 전송 함수 (window 객체에 바인딩하여 HTML에서 접근 가능하게 함)
        window.submitPrayer = async () => {
            if (!auth.currentUser) {
                setStatus("로그인 중입니다. 잠시만 기다려주세요.", true);
                return;
            }

            const nameInput = document.getElementById('prayer-name');
            const contentInput = document.getElementById('prayer-content');
            const btn = document.getElementById('submit-btn');

            const name = nameInput.value.trim() || "익명의 동역자";
            const content = contentInput.value.trim();

            if (!content) {
                setStatus("내용을 입력해 주세요.", true);
                return;
            }

            btn.disabled = true;
            btn.innerText = "전송 중...";
            setStatus("기도 제목을 보내는 중...");

            try {
                const prayerRef = collection(db, 'artifacts', appId, 'public', 'data', 'prayers');
                await addDoc(prayerRef, {
                    name: name,
                    content: content,
                    amenCount: 0,
                    color: ['#fef3c7', '#dcfce7', '#dbeafe', '#fce7f3', '#f3e8ff'][Math.floor(Math.random() * 5)],
                    createdAt: serverTimestamp()
                });
                
                contentInput.value = "";
                nameInput.value = "";
                setStatus("기도가 성공적으로 등록되었습니다!");
            } catch (e) {
                console.error(e);
                setStatus("전송 에러: " + e.message, true);
            } finally {
                btn.disabled = false;
                btn.innerText = "포스트잇 붙이기";
            }
        };

        window.addAmen = async (id) => {
            if (!auth.currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'prayers', id);
                await updateDoc(docRef, { amenCount: increment(1) });
            } catch (e) {
                setStatus("아멘 에러: " + e.message, true);
            }
        };

        function renderPrayers(prayers) {
            const container = document.getElementById('prayer-list');
            if (!container) return;
            if (prayers.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-stone-400">아직 첫 번째 기도가 없습니다.</div>`;
                return;
            }
            container.innerHTML = prayers.map(p => `
                <div class="p-6 rounded-lg shadow-md transform rotate-${(Math.random() > 0.5 ? '1' : '-1')} transition hover:scale-105 hover:rotate-0" 
                     style="background-color: ${p.color || '#fef3c7'}; min-height: 180px; display: flex; flex-direction: column; justify-content: space-between;">
                    <div>
                        <div class="flex justify-between items-center mb-4 border-b border-black/5 pb-2">
                            <span class="text-[10px] font-bold text-stone-800/60 uppercase">${p.name}</span>
                            <span class="text-[9px] text-stone-800/40">${p.createdAt ? new Date(p.createdAt.seconds * 1000).toLocaleDateString() : '방금'}</span>
                        </div>
                        <p class="text-stone-800 text-sm leading-relaxed whitespace-pre-wrap font-medium">${p.content}</p>
                    </div>
                    <div class="mt-4 pt-2 border-t border-black/5 flex justify-end">
                        <button onclick="addAmen('${p.id}')" class="flex items-center gap-1 text-xs font-bold text-stone-700/60 hover:text-red-500 transition">
                            🙏 아멘 ${p.amenCount || 0}
                        </button>
                    </div>
                </div>
            `).join('');
        }
    </script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { background-color: #fdfbf7; color: #334155; font-family: 'Pretendard', sans-serif; overflow-x: hidden; }
        .page-content { display: none; }
        .page-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-link.active { color: #8b7355; font-weight: 800; border-bottom: 2px solid #8b7355; }
        .main-img { width: 100%; max-width: 500px; height: auto; border-radius: 2.5rem; box-shadow: 0 20px 50px rgba(139, 115, 85, 0.15); margin: 0 auto; }
        .tab-link.active { background-color: #8b7355; color: white; }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 bg-white/90 backdrop-blur-md border-b border-stone-200">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <button onclick="navigateTo('home')" class="flex items-center gap-2 font-bold text-stone-800 text-lg tracking-tighter">
                <span>🌱</span> 3040 Basecamp
            </button>
            <div class="flex space-x-4 md:space-x-8 text-[11px] md:text-sm font-bold text-stone-500 uppercase">
                <button onclick="navigateTo('voices')" class="nav-link px-1 py-1 transition">분석</button>
                <button onclick="navigateTo('analytics')" class="nav-link px-1 py-1 transition">통계</button>
                <button onclick="navigateTo('vision')" class="nav-link px-1 py-1 transition">비전</button>
                <button onclick="navigateTo('prayer')" class="nav-link px-1 py-1 text-[#8b7355]">기도실</button>
            </div>
        </div>
    </nav>

    <!-- 1. HOME -->
    <div id="home" class="page-content active pt-32 min-h-screen text-center px-6">
        <img src="9.jpg" alt="메인 이미지" class="main-img mb-10">
        <h1 class="text-3xl md:text-5xl font-extrabold text-stone-900 leading-tight mb-4 tracking-tighter">함께 그리며 걷는<br><span class="text-[#8b7355]">3040 공동체</span></h1>
        <p class="text-stone-500 text-lg max-w-xl mx-auto mb-10 leading-relaxed">우리 공동체의 첫 목소리와 비전을 담았습니다.</p>
        <div class="flex flex-wrap justify-center gap-4 pb-20">
            <button onclick="navigateTo('voices')" class="px-10 py-4 bg-[#8b7355] text-white rounded-full font-bold shadow-xl">분석 결과 보기</button>
            <button onclick="navigateTo('prayer')" class="px-10 py-4 bg-white text-[#8b7355] border-2 border-[#8b7355] rounded-full font-bold">기도 담벼락</button>
        </div>
    </div>

    <!-- 2. VOICES -->
    <div id="voices" class="page-content pt-24 min-h-screen">
        <div class="max-w-5xl mx-auto px-6 py-12 text-center">
            <h2 class="text-3xl font-extrabold mb-10 text-stone-800">우리가 나눈 이야기</h2>
            <div class="flex justify-center mb-12 p-1 bg-stone-100 rounded-2xl max-w-md mx-auto">
                <button onclick="switchTab('exp')" class="tab-link flex-1 py-3 rounded-xl text-sm font-bold active">원하는 경험</button>
                <button onclick="switchTab('worry')" class="tab-link flex-1 py-3 rounded-xl text-sm font-bold transition">고민</button>
                <button onclick="switchTab('ideal')" class="tab-link flex-1 py-3 rounded-xl text-sm font-bold transition">기대</button>
            </div>
            <div id="tab-content" class="grid grid-cols-1 md:grid-cols-2 gap-8 text-left"></div>
        </div>
    </div>

    <!-- 3. ANALYTICS -->
    <div id="analytics" class="page-content pt-24 min-h-screen bg-stone-50">
        <div class="max-w-6xl mx-auto px-6 py-12">
            <h2 class="text-3xl font-extrabold text-center mb-12">데이터로 본 우리의 마음</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div class="bg-white p-10 rounded-[2.5rem] border border-stone-100 shadow-sm"><div class="h-72"><canvas id="needsChart"></canvas></div></div>
                <div class="bg-white p-10 rounded-[2.5rem] border border-stone-100 shadow-sm"><div class="h-72"><canvas id="concernsChart"></canvas></div></div>
            </div>
        </div>
    </div>

    <!-- 4. VISION -->
    <div id="vision" class="page-content pt-24 min-h-screen bg-stone-900 text-white">
        <div class="max-w-6xl mx-auto px-6 py-20 text-center">
            <h2 class="text-6xl font-extrabold mb-16 text-[#d4b08c]">3040 베이스캠프 비전</h2>
            <div class="space-y-6 text-left">
                <div class="p-8 bg-stone-800 rounded-5xl border border-stone-700 font-bold text-[#d4b08c]">1. 삶과 신앙이 연결되는 공동체</div>
                <div class="p-8 bg-stone-800 rounded-5xl border border-stone-700 font-bold text-[#d4b08c]">2. 깊이 연결되는 소그룹 구조</div>
                <div class="p-8 bg-stone-800 rounded-5xl border border-stone-700 font-bold text-[#d4b08c]">3. 누구에게나 열린 따뜻한 환영</div>
                <div class="p-8 bg-stone-800 rounded-5xl border border-stone-700 font-bold text-[#d4b08c]">4. 현실을 배려하는 실질적 인프라</div>
                <div class="p-8 bg-stone-800 rounded-5xl border border-stone-700 font-bold text-[#d4b08c]">5. 수평적으로, 함께 만들어가는 모임</div>
            </div>
        </div>
    </div>

    <!-- 5. PRAYER -->
    <div id="prayer" class="page-content pt-24 min-h-screen bg-stone-200">
        <div class="max-w-6xl mx-auto px-6 py-12">
            <div class="text-center mb-12">
                <h2 class="text-4xl font-black text-stone-900 mb-2 tracking-tighter">실시간 기도의 담벼락</h2>
                <p class="text-stone-600 font-medium italic">성도님들의 마음을 담은 포스트잇을 붙여주세요.</p>
                <div id="conn-status" class="text-xs text-stone-400 mt-2">연결 준비 중...</div>
            </div>
            
            <div class="bg-white p-8 rounded-3xl border-4 border-stone-300 shadow-xl mb-16 max-w-2xl mx-auto">
                <div class="flex flex-col gap-4">
                    <input type="text" id="prayer-name" placeholder="이름 (비워두면 익명)" class="p-4 rounded-xl bg-stone-50 border border-stone-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#8b7355]">
                    <textarea id="prayer-content" placeholder="기도제목을 적어주세요..." rows="3" class="p-4 rounded-xl bg-stone-50 border border-stone-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#8b7355]"></textarea>
                    <button id="submit-btn" disabled onclick="submitPrayer()" class="w-full bg-stone-300 text-white py-4 rounded-xl font-black transition text-lg shadow-lg">서버 연결 중...</button>
                </div>
            </div>
            
            <div id="prayer-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 pb-20"></div>
        </div>
    </div>

    <footer class="bg-white py-12 text-center text-stone-400 text-xs border-t border-stone-100">
        <p>© 2026 PCK 3040 Community Basecamp</p>
    </footer>

    <script>
        function navigateTo(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.toggle('active', link.getAttribute('onclick').includes(pageId));
            });
            if (pageId === 'analytics') renderCharts();
            window.scrollTo(0, 0);
        }

        const surveyData = {
            exp: [{ title: "관계&교제", items: ["서로를 알아가는 시간", "가까운 교회 친구 사귀기", "서로의 삶을 나누고 서로 알아가길 원해요", "수련회(집회), 식사의 교제"] }, { title: "신앙 성장&말씀", items: ["말씀의 떡 떼기", "깊은 성경공부", "교회 안에서의 소속감 상승,신앙 성장"] }, { title: "기도&동역", items: ["함께 기도하며 기도의 힘,동역의 힘 맛보기", "기도해주는 동역자 매칭", "믿음의 동역자,후원자,지지자들과 기도로 함께 돌파해나가고 싶다"] }, { title: "위로, 삶의 치유", items: ["나만 힘든 것이 아니라는 위로,격려,응원", "살아가는 얘기를 편히 이야기 나누며 치유받는 느낌", "서로의 삶을 신앙 안에서 풀어나가기", "부부간의 신앙 상담"] }],
            worry: [{ title: "자녀&육아", items: ["자녀 교욱,양육의 어려움", "육아,믿음의 가정(나,배우자,자녀들)을 세워가는 과정"] }, { title: "신앙&삶의 균형", items: ["직장 생활 고충", "신앙생활, 내 삶 속에서 신앙을 유지해 나가는 방법"] }, { title: "부부&가정", items: ["부부간에 대한 고민들", "고부간 갈등"] }, { title: "경제&미래 준비", items: ["경제적 관리 방법", "50대를 어떻게 준비할 것인가"] }],
            ideal: [{ title: "소그룹", items: ["깊은 나눔이 가능한 3-4가정 모임", "삶을 공유하고 기도해줄 수 있는 공동체", "서로의 삶을 편하게 나눌 수 있는 공동체"] }, { title: "따뜻한 환영", items: ["서로 환영해주고 반겨주는 모임", "소외 당하는 이가 없는 따듯한 모임","신앙적 배려가 있는 모습"] }, { title: "편안함", items: ["서로 부담이 되지 않고 편하게 신앙생활", "함께 있어도 편하게 서로 이야기 할 수 있는 모임","친밀한 관계가 쌓여서 놀러오듯 오고 싶어지는 모임"] }, { title: "실질적 배려&지속성", items: ["일관성 있는 커리큘럼", "자녀를 믿고 맡길 수 있는 위탁환경, 쾌적한 장소","교회 밖 모임과 활동으로도 추억이 생기는 모습"] }]
        };

        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-link').forEach(b => b.classList.toggle('active', b.getAttribute('onclick').includes(tabId)));
            document.getElementById('tab-content').innerHTML = surveyData[tabId].map(g => `
                <div class="bg-white p-8 rounded-3xl border border-stone-200 shadow-sm">
                    <h4 class="text-xl font-bold text-[#8b7355] mb-6 flex items-center gap-2">📌 ${g.title}</h4>
                    <ul class="space-y-4 text-stone-600 text-sm">${g.items.map(i => `<li class="flex items-start gap-2"><span>•</span>${i}</li>`).join('')}</ul>
                </div>`).join('');
        };
        switchTab('exp');

        let c1, c2;
        function renderCharts() {
            if (c1) c1.destroy(); if (c2) c2.destroy();
            const ctx1 = document.getElementById('needsChart').getContext('2d');
            c1 = new Chart(ctx1, { type: 'doughnut', data: { labels: ['교제', '영성', '지원'], datasets: [{ data: [45, 35, 20], backgroundColor: ['#8b7355', '#64748b', '#d6d3d1'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } } });
            const ctx2 = document.getElementById('concernsChart').getContext('2d');
            c2 = new Chart(ctx2, { type: 'bar', data: { labels: ['양육', '신앙', '직장', '부부', '경제'], datasets: [{ label: '빈도', data: [95, 80, 75, 60, 45], backgroundColor: '#8b7355', borderRadius: 10 }] }, options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
        }
    </script>
</body>
</html>
