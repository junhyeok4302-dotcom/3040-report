<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3040 베이스캠프 | 설문분석 & 기도제목</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { background-color: #fdfbf7; color: #334155; font-family: 'Pretendard', sans-serif; }
        .chart-container { position: relative; width: 100%; max-width: 600px; margin: auto; height: 320px; }
        .fade-in-up { opacity: 0; transform: translateY(20px); transition: all 0.8s ease-out; }
        .fade-in-up.visible { opacity: 1; transform: translateY(0); }
        .tab-btn.active { border-bottom: 2px solid #8b7355; color: #8b7355; font-weight: 600; }
        
        /* 패들렛 컨테이너 스타일 */
        .padlet-wrapper {
            position: relative;
            width: 100%;
            height: 600px; /* 게시판 높이 */
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed w-full z-50 bg-brand-light/90 backdrop-blur-md border-b border-stone-200 bg-white/80">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2 font-bold text-stone-800">
                <span>🌱</span> 3040 Basecamp
            </div>
            <div class="hidden md:flex space-x-6 text-sm font-medium text-stone-600">
                <a href="#overview">개요</a>
                <a href="#voices">분석</a>
                <a href="#vision">비전</a>
                <a href="#prayer" class="text-brand-primary text-[#8b7355]">기도제목</a>
            </div>
        </div>
    </nav>

    <header id="overview" class="pt-32 pb-10 px-4 text-center">
        <h1 class="text-4xl font-extrabold text-stone-800 mb-4">3040 설문 분석 & 기도의 담벼락</h1>
        <p class="text-stone-600">우리의 목소리를 담고, 서로를 위해 기도하는 공간입니다.</p>
    </header>

    <section id="prayer" class="py-20 bg-stone-100">
        <div class="max-w-5xl mx-auto px-4">
            <div class="text-center mb-10 fade-in-up">
                <span class="text-[#8b7355] font-bold text-sm uppercase tracking-widest">Prayer Community</span>
                <h2 class="text-3xl font-bold text-stone-800 mt-2 mb-4">기도의 담벼락</h2>
                <p class="text-stone-600">
                    말하기 어려운 고민, 함께 나누고 싶은 감사 제목을 남겨주세요.<br>
                    우측 하단의 <strong class="text-[#8b7355]">+ 버튼</strong>을 눌러 익명으로 글을 남길 수 있습니다.
                </p>
            </div>

            <div class="fade-in-up">
                <div class="padlet-wrapper">
                    <iframe 
                        src="https://padlet.com/embed/5retyra4ucl6hxl0" 
                        frameborder="0" 
                        allow="camera;microphone;geolocation" 
                        style="width:100%;height:100%;background:#fff;">
                    </iframe>
                </div>
                <div class="mt-4 text-center text-xs text-stone-400">
                    * 작성하신 내용은 실시간으로 공유되며, 서로를 위한 중보 기도로 사용됩니다.
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-stone-900 py-10 text-center text-stone-500 text-sm">
        <p>© 2026 PCK 3040 Community. 모든 기도와 나눔은 소중히 간직됩니다.</p>
    </footer>

    <script>
        // 애니메이션 효과
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-in-up').forEach(el => observer.observe(el));
    </script>
</body>
</html>
